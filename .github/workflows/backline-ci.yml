name: backline-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Guardrail checks
        run: ./scripts/check-guardrails.sh

      - name: Contract drift checks
        run: ./scripts/check-contract-drift.sh

      - name: Build and test
        run: ./gradlew clean check
        env:
          CI: "true"

      - name: Coverage summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob,xml.etree.ElementTree as ET
          for p in sorted(glob.glob('**/build/reports/jacoco/test/jacocoTestReport.xml', recursive=True)):
              mod=p.split('/build/')[0]
              root=ET.parse(p).getroot()
              c={e.attrib['type']:(int(e.attrib['missed']),int(e.attrib['covered'])) for e in root.findall('counter')}
              miss,cov=c['LINE']; total=miss+cov; pct=(cov/total*100 if total else 0)
              print(f'{mod}: line={pct:.1f}%')
          PY

      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-test-results
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/**

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-reports
          path: |
            **/build/reports/jacoco/test/**

  e2e-demo:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Full-stack E2E demo
        run: ./scripts/ci-e2e-demo.sh
        env:
          CI: "true"
          BACKLINE_E2E_ARTIFACT_DIR: ${{ github.workspace }}/build/e2e-artifacts
          BACKLINE_RUN_PERF_SMOKE: "true"

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-demo-artifacts
          path: build/e2e-artifacts/**
