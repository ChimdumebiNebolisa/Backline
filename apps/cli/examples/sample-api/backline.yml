project: sample-api
environment: local

checks:
  - key: health
    name: Health check
    method: GET
    url: http://localhost:8081/health
    expected_status: 200
    max_latency_ms: 300

  - key: get-user
    name: Fetch user
    method: GET
    url: http://localhost:8081/users/1
    expected_status: 200
    max_latency_ms: 500
    assertions:
      - path: $.id
        equals: 1
      - path: $.email
        exists: true

  - key: broken-endpoint
    name: Broken endpoint
    method: GET
    url: http://localhost:8081/broken
    expected_status: 200
    max_latency_ms: 500

  - key: schema-change
    name: Schema change endpoint
    method: GET
    url: http://localhost:8081/schema-change
    expected_status: 200
    max_latency_ms: 500
    contract:
      enabled: true
      severity: warn
      ignore_paths:
        - $.meta.generated_at
