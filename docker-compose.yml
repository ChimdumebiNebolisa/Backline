name: backline

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backline}
      POSTGRES_USER: ${POSTGRES_USER:-backline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backline}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-backline}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-backline}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-backline}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-backline}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-backline}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-backline}
      BACKLINE_WORKER_ID: ${BACKLINE_WORKER_ID:-worker-1}

  sample-api:
    profiles:
      - demo
    build:
      context: .
      dockerfile: apps/sample-api/Dockerfile
    ports:
      - "8081:8081"
    environment:
      BACKLINE_SAMPLE_PORT: "8081"

volumes:
  pgdata:
